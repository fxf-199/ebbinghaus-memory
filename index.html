<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#4A6CF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>记忆助手</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F1F5F9;--card:#fff;--text:#1E293B;--sub:#64748B;--muted:#94A3B8;--pri:#4A6CF7;--pri-bg:#EEF2FF;--border:#E2E8F0;--danger:#EF4444;--danger-bg:#FEF2F2;--warn:#F59E0B;--warn-bg:#FFFBEB;--ok:#10B981;--ok-bg:#ECFDF5;--shadow:0 1px 3px rgba(0,0,0,.06)}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased
}
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--card);
  border-top:1px solid var(--border);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0)
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;color:var(--muted);font-size:11px;cursor:pointer;border:none;background:none;
  transition:color .15s;position:relative
}
.tab-item.active{color:var(--pri);font-weight:600}
.tab-icon{font-size:22px;line-height:1}
.tab-item .badge{
  position:absolute;top:4px;left:calc(50% + 12px);background:var(--danger);color:#fff;
  font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;
  align-items:center;justify-content:center;padding:0 5px;font-weight:700
}
.tab-item .badge:empty{display:none}

.main{padding:16px 16px 88px;max-width:500px;margin:0 auto}
.page{display:none;animation:fadeIn .2s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.header{text-align:center;padding:20px 0 8px}
.header h1{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.header .sub{font-size:13px;color:var(--sub);margin-top:2px}

.card{
  background:var(--card);border-radius:16px;padding:20px;margin-bottom:14px;
  box-shadow:var(--shadow)
}
.card-title{font-size:15px;font-weight:700;color:#334155;margin-bottom:8px}

.stat-row{display:flex;gap:10px;margin-bottom:14px}
.stat-box{
  flex:1;background:var(--card);border-radius:14px;padding:16px 12px;text-align:center;box-shadow:var(--shadow)
}
.stat-val{font-size:32px;font-weight:800;color:var(--text);line-height:1.1}
.stat-box.accent .stat-val{color:var(--pri)}
.stat-box.success .stat-val{color:var(--ok)}
.stat-box.warn  .stat-val{color:var(--warn)}

.stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.stat-sub{font-size:11px;color:var(--sub);margin-top:2px}

.review-empty{text-align:center;padding:40px 0}
.review-empty .emoji{font-size:56px;margin-bottom:12px}
.review-empty p{color:var(--muted);font-size:15px;margin-bottom:6px}

.review-card-wrapper{perspective:600px}
.review-card{
  background:var(--card);border-radius:20px;padding:32px 24px;min-height:200px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;
  position:relative;overflow:hidden;transition:transform .3s,opacity .3s
}
.review-card.swipe-out{transform:translateX(100%);opacity:0}
.review-card.swipe-left{transform:translateX(-100%);opacity:0}
.review-del-btn{
  position:absolute;top:10px;right:12px;width:30px;height:30px;border-radius:10px;
  border:1px solid #FEE2E2;background:#FEF2F2;color:#EF4444;font-size:14px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:5
}
.review-del-btn:active{background:#FEE2E2}

.review-stage{font-size:12px;color:var(--muted);padding:3px 10px;background:var(--bg);border-radius:10px}
.review-cat{font-size:11px;color:var(--pri);padding:2px 8px;background:var(--pri-bg);border-radius:8px;font-weight:600}
.review-hint{font-size:15px;color:var(--sub)}

/* ── 短句大字 ── */
.review-front{
  font-size:24px;font-weight:800;color:var(--text);line-height:1.4;
  word-break:break-word;max-width:100%;padding:0 4px
}
/* ── 中段标准 ── */
.review-back{
  font-size:18px;font-weight:600;color:var(--pri);line-height:1.5;
  word-break:break-word;max-width:100%;padding:0 4px
}
/* ── 纯内容（长短自适应） ── */
.review-content{
  font-size:20px;font-weight:700;color:var(--text);line-height:1.6;
  word-break:break-word;max-width:100%;padding:0 4px
}
.review-content.long{
  font-size:16px;font-weight:500;text-align:left;max-height:300px;overflow-y:auto
}

.rating-row{display:flex;gap:10px;width:100%;margin-top:4px}
.rating-btn{
  flex:1;padding:14px 8px;border-radius:14px;border:2px solid var(--border);
  background:var(--card);font-size:14px;font-weight:600;cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;
  -webkit-tap-highlight-color:transparent
}
.rating-btn:active{transform:scale(.96)}
.rating-btn .r-emoji{font-size:20px}
.rating-btn.forgot:active,.rating-btn.forgot:hover{border-color:var(--danger);background:var(--danger-bg)}
.rating-btn.vague:active,.rating-btn.vague:hover{border-color:var(--warn);background:var(--warn-bg)}
.rating-btn.gotit:active,.rating-btn.gotit:hover{border-color:var(--ok);background:var(--ok-bg)}

.review-summary{text-align:center;padding:30px 0}
.review-summary .emoji{font-size:56px;margin-bottom:12px}
.review-summary .title{font-size:20px;font-weight:800;margin-bottom:6px}
.review-summary .detail{font-size:14px;color:var(--sub);margin-bottom:4px}

/* ── Category Selector ── */
.cat-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.cat-chip{
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;
  border:2px solid var(--border);background:var(--card);color:var(--sub);transition:all .15s;white-space:nowrap
}
.cat-chip.selected{border-color:var(--pri);background:var(--pri-bg);color:var(--pri);font-weight:600}

.import-textarea{
  width:100%;min-height:160px;border:2px solid var(--border);border-radius:14px;
  padding:16px;font-size:15px;font-family:inherit;resize:vertical;
  outline:none;transition:border-color .15s;line-height:1.6;color:var(--text)
}
.import-textarea:focus{border-color:var(--pri)}
.import-hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
.import-preview{margin-top:12px;max-height:160px;overflow-y:auto}

.preview-item{
  padding:10px 14px;background:var(--card);border-radius:10px;margin-bottom:6px;
  font-size:14px;color:#334155;border-left:3px solid var(--pri);box-shadow:var(--shadow)
}
.preview-item .idx{font-size:11px;color:var(--muted);margin-right:6px}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 24px;border-radius:12px;font-size:15px;font-weight:600;
  border:none;cursor:pointer;transition:all .15s;width:100%;
  -webkit-tap-highlight-color:transparent
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--pri);color:#fff}
.btn-primary:active{background:#3B5DE7}
.btn-outline{background:var(--card);color:var(--pri);border:2px solid var(--pri)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:2px solid #FEE2E2}
.btn-danger:active{background:#FEE2E2}
.btn-sm{padding:8px 16px;font-size:13px;width:auto}
.btn-xs{padding:5px 12px;font-size:12px;width:auto;border-radius:8px}
.btn:disabled{opacity:.5;pointer-events:none}
.btn-row{display:flex;gap:8px}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1E293B;
  color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;
  z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;
  box-shadow:0 4px 12px rgba(0,0,0,.15)
}
.toast.show{opacity:1}

.note-list-item{
  display:flex;justify-content:space-between;align-items:center;gap:6px;
  padding:8px 12px;background:var(--card);border-radius:12px;margin-bottom:6px;
  box-shadow:var(--shadow)
}
.note-list-item .n-content{flex:1;font-size:14px;color:#334155;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:6px}
.note-list-item .n-cat{font-size:10px;background:var(--pri-bg);color:var(--pri);padding:2px 8px;border-radius:8px;white-space:nowrap;font-weight:500;flex-shrink:0}
.note-list-item .n-meta{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.note-list-item .n-acts{display:flex;gap:4px;flex-shrink:0}
.note-list-item .n-acts button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0}
.note-list-item .n-acts button:active{background:var(--bg)}

.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-chip{
  padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;cursor:pointer;
  border:2px solid var(--border);background:var(--card);color:var(--sub);transition:all .15s
}
.filter-chip.selected{border-color:var(--pri);background:var(--pri-bg);color:var(--pri)}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;
  display:flex;align-items:center;justify-content:center;animation:fadeIn .2s
}
.modal-box{
  background:var(--card);border-radius:20px;padding:24px;width:calc(100% - 48px);
  max-width:400px;max-height:85vh;overflow-y:auto
}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:14px}
.modal-box label{display:block;font-size:13px;color:var(--sub);margin-bottom:4px;margin-top:10px}
.modal-box label:first-of-type{margin-top:0}
.modal-box p{font-size:14px;color:var(--sub);margin-bottom:12px;line-height:1.6}
.modal-actions{display:flex;gap:10px;margin-top:16px}

.modal-input{
  width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;outline:none
}
.modal-input:focus{border-color:var(--pri)}
.modal-textarea{
  width:100%;min-height:80px;padding:10px 14px;border:2px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;outline:none;resize:vertical
}
.modal-textarea:focus{border-color:var(--pri)}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══════════ 复习页 ═══════════ -->
<div class="main"><div class="page active" id="page-review">
  <div class="header">
    <h1>📖 记忆助手</h1>
    <div class="sub" id="review-sub">艾宾浩斯间隔复习 <span style="color:var(--muted);font-size:10px">v10</span></div>
  </div>
  <div id="review-dashboard"></div>
  <div id="review-active" style="display:none"></div>
  <div id="review-done" style="display:none"></div>
</div></div>

<!-- ═══════════ 导入页 ═══════════ -->
<div class="main"><div class="page" id="page-import">
  <div class="header">
    <h1>📥 导入笔记</h1>
    <div class="sub">选择分类，用 <code>---</code> 分隔，用 <code>|</code> 拆正反面</div>
  </div>
  <div class="card" style="padding:14px">
    <div style="font-size:13px;color:var(--sub);margin-bottom:8px">📂 导入到分类</div>
    <div class="cat-selector" id="cat-selector"></div>
    <button class="btn btn-sm btn-outline" id="manage-cat-btn" style="width:auto;margin-top:4px">⚙️ 管理分类</button>
  </div>
  <textarea class="import-textarea" id="import-ta" placeholder="在此粘贴笔记，每条用 --- 分隔&#10;支持正反面：正面内容 | 反面内容&#10;&#10;例如：&#10;画蛇添足 | 比喻做事多余 &#10;---&#10;艾宾浩斯遗忘曲线表明记忆在20分钟后遗忘42%&#10;---&#10;SiC具有高导热率 | 适用于先进封装散热场景"></textarea>
  <div class="import-hint">💡 <code>---</code> 分隔每条笔记 · <code>|</code> 拆分正反面（复习时先看正面再翻转）</div>
  <div class="import-preview" id="import-preview"></div>
  <button class="btn btn-primary" id="import-btn" style="margin-top:14px">📥 导入笔记</button>

  <div style="margin-top:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="card-title" style="margin:0">📋 笔记列表</div>
      <div class="btn-row">
        <button class="btn btn-xs btn-outline" id="export-btn" style="width:auto">📤 导出</button>
        <button class="btn btn-xs btn-outline" id="import-json-btn" style="width:auto">📥 导入</button>
      </div>
    </div>
    <div class="filter-row" id="note-filter"></div>
    <input type="text" class="modal-input" id="search-input" placeholder="🔍 搜索笔记（正面/反面/内容）" style="margin-bottom:10px" oninput="renderNoteList()">
    <div id="note-list"></div>
    <button class="btn btn-danger btn-sm" id="clear-btn" style="margin-top:10px">🗑 按分类清空</button>
  </div>
  <input type="file" id="import-file" accept=".json" style="display:none">
</div></div>

<!-- ═══════════ 统计页 ═══════════ -->
<div class="main"><div class="page" id="page-stats">
  <div class="header">
    <h1>📊 学习统计</h1>
    <div class="sub">你的记忆轨迹</div>
  </div>
  <div id="stats-content"></div>
</div></div>

<!-- ═══════════ 底部导航 ═══════════ -->
<nav class="tab-bar">
  <button class="tab-item active" data-page="review">
    <span class="tab-icon">📖</span>复习<span class="badge" id="due-badge"></span>
  </button>
  <button class="tab-item" data-page="import">
    <span class="tab-icon">📥</span>导入
  </button>
  <button class="tab-item" data-page="stats">
    <span class="tab-icon">📊</span>统计
  </button>
</nav>

<script>
/* ═══════════════════════════════════════════
   记忆助手 v3 — 正反面 + 编辑删除 + 导出导入
   ═══════════════════════════════════════════ */

const DB_NAME = 'ebbinghaus-db', DB_VER = 3;
let db;

function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('notes')){
        const s = d.createObjectStore('notes',{keyPath:'id',autoIncrement:true});
        s.createIndex('nextReview','nextReview');
        s.createIndex('stage','stage');
        s.createIndex('category','category');
      }
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror = () => rej(r.error);
  });
}

function dbPut(note){ return new Promise((res,rej)=>{ const t = db.transaction('notes','readwrite').objectStore('notes').put(note); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); }
function dbGetAll(){ return new Promise((res,rej)=>{ const t = db.transaction('notes','readonly').objectStore('notes').getAll(); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); }
function dbGet(id){ return new Promise((res,rej)=>{ const t = db.transaction('notes','readonly').objectStore('notes').get(id); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); }
function dbDelete(id){ return new Promise((res,rej)=>{ const t = db.transaction('notes','readwrite').objectStore('notes').delete(id); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }
function dbClear(){ return new Promise((res,rej)=>{ const t = db.transaction('notes','readwrite').objectStore('notes').clear(); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }

// ── 分类管理 ──
const CAT_KEY = 'ebbinghaus-cats';
const DEFAULT_CAT = '未分类';
function getCats(){ try { const v=localStorage.getItem(CAT_KEY); return v?JSON.parse(v):[DEFAULT_CAT]; } catch(e){ return[DEFAULT_CAT]; } }
function saveCats(c){ localStorage.setItem(CAT_KEY,JSON.stringify(c)); }
(function(){ const c=getCats(); if(!c.includes(DEFAULT_CAT)){c.unshift(DEFAULT_CAT);saveCats(c);} })();

// ── Ebbinghaus ──
const INTERVALS = [1,2,4,7,15,30,60];
const WEAK_DISCOUNT = 0.6; // 薄弱项「记住了」后间隔打折系数（扇贝思路：难点缩短复习间隔）
const WEAK_FILTER = '__weak__'; // 「🔥 待攻克」特殊筛选值
function weakBadge(n){ return (n.weakStreak||0)>=2?'🔥 ':''; }
const DAILY_LIMIT = 30; // 默认上限
// 每日新学配额（localStorage，按分类独立）
const Q_KEY = 'ebbinghaus-quota';
function getQuota(){try{const v=localStorage.getItem(Q_KEY);return v?JSON.parse(v):{};}catch(e){return{};}}
function saveQuota(q){localStorage.setItem(Q_KEY,JSON.stringify(q));}
function dailyQuotaKey(cat){return todayStr()+'_'+cat;}
function getDailyNewUsed(cat){const q=getQuota();return q[dailyQuotaKey(cat)]||0;}
function addDailyNewUsed(cat,n){const q=getQuota(),k=dailyQuotaKey(cat);q[k]=(q[k]||0)+n;saveQuota(q);}
// 每分类自定义上限
const L_KEY = 'ebbinghaus-limits';
function getLimits(){try{const v=localStorage.getItem(L_KEY);return v?JSON.parse(v):{};}catch(e){return{};}}
function saveLimits(l){localStorage.setItem(L_KEY,JSON.stringify(l));}
function getCatLimit(cat){const l=getLimits();return l[cat]||DAILY_LIMIT;}
function setCatLimit(cat,n){const l=getLimits();l[cat]=n;saveLimits(l);}
// 复习断点续传
const S_KEY = 'ebbinghaus-session';
function saveSession(ids,idx,cat){localStorage.setItem(S_KEY,JSON.stringify({ids,idx,cat,time:now()}));}
function loadSession(){try{const v=localStorage.getItem(S_KEY);return v?JSON.parse(v):null;}catch(e){return null;}}
function clearSession(){localStorage.removeItem(S_KEY);}
// 撤销快照
let undoSrc=null;
function getNextStage(stage){const s=Math.min(stage+1,INTERVALS.length);return s>=INTERVALS.length?null:s;}
function getNextDays(stage){return stage>=INTERVALS.length-1?null:INTERVALS[Math.min(stage+1,INTERVALS.length-1)];}
function now(){return Date.now();}
function addDays(ts,d){return ts+d*86400000;}
function stageLabel(s){
  if(s>=INTERVALS.length)return'✅ 已掌握';
  if(s===0)return'🆕 新学';
  return`🔄 第${s}次复习（${INTERVALS[s]}天）`;
}

function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }

// ── 字数分档 ──
function contentClass(s){ return (s||'').length>100?' long':''; }

// ── Toast ──
let ttTimer;
function toast(m){ const e=document.getElementById('toast'); e.textContent=m;e.classList.add('show');clearTimeout(ttTimer);ttTimer=setTimeout(()=>e.classList.remove('show'),1800); }

// ── Helpers ──
function eHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function eAttr(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function todayStr(){return new Date().toISOString().slice(0,10);}

// ── Tab ──
let currentTab='review';
document.querySelectorAll('.tab-item').forEach(b=>{b.addEventListener('click',()=>{currentTab=b.dataset.page;document.querySelectorAll('.tab-item').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('page-'+currentTab).classList.add('active');if(currentTab==='review')renderReviewDashboard();if(currentTab==='import'){renderCatSelector();renderNoteList();}if(currentTab==='stats')renderStats();});});

// ── 分类选择器 ──
let selectedCat=DEFAULT_CAT;
function renderCatSelector(){
  const c=getCats();
  document.getElementById('cat-selector').innerHTML=c.map(x=>`<span class="cat-chip${x===selectedCat?' selected':''}" onclick="selectCat('${eAttr(x)}')">${eHtml(x)}</span>`).join('');
}
function selectCat(c){selectedCat=c;renderCatSelector();}

// ── 分类管理弹窗 ──
document.getElementById('manage-cat-btn').addEventListener('click',showCatMgr);
function showCatMgr(){
  const c=getCats();const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal-box"><h3>📂 管理分类</h3><div style="margin-bottom:12px" id="cat-list-modal">${c.map((x,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:14px">${eHtml(x)}</span><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;color:var(--muted)">日上限</span><input type="number" class="cat-limit-inp" data-cat="${eAttr(x)}" value="${getCatLimit(x)}" min="1" max="999" style="width:48px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:center">${x===DEFAULT_CAT?'<span style="font-size:11px;color:var(--muted)">默认</span>':`<button class="btn btn-xs btn-danger cat-del-btn" data-cat="${eAttr(x)}" style="width:auto">删除</button>`}</div></div>`).join('')}</div><div style="display:flex;gap:8px"><input class="modal-input" id="new-cat-input" placeholder="新分类名" maxlength="10"><button class="btn btn-sm btn-primary" id="add-cat-btn" style="width:auto">添加</button></div><div class="modal-actions"><button class="btn btn-sm btn-outline" id="close-cm">关闭</button></div></div>`;
  document.body.appendChild(o);
  // 事件委托：删除分类按钮
  o.querySelectorAll('.cat-del-btn').forEach(btn=>{btn.onclick=()=>delCat(btn.dataset.cat);});
  o.querySelectorAll('.cat-limit-inp').forEach(inp=>{inp.onchange=()=>{const v=parseInt(inp.value)||DAILY_LIMIT;setCatLimit(inp.dataset.cat,Math.max(1,Math.min(999,v)));toast('上限已更新');};});
  o.querySelector('#close-cm').onclick=()=>{o.remove();renderCatSelector();renderReviewDashboard();renderNoteList();};
  o.querySelector('#add-cat-btn').onclick=()=>{
    const v=o.querySelector('#new-cat-input').value.trim();
    if(!v){toast('请输入分类名');return;}if(v.length>10){toast('不超过10字');return;}
    const cs=getCats();if(cs.includes(v)){toast('已存在');return;}
    cs.push(v);saveCats(cs);o.remove();showCatMgr();renderCatSelector();
  };
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
}
async function delCat(cat){
  if(cat===DEFAULT_CAT){toast('不能删除默认分类');return;}
  if(!confirm(`确定删除「${cat}」？笔记将归入「未分类」。`))return;
  try{
    const all=await dbGetAll();
    const tasks=all.filter(n=>n.category===cat).map(n=>{n.category=DEFAULT_CAT;return dbPut(n);});
    await Promise.all(tasks);
    const cs=getCats().filter(x=>x!==cat);saveCats(cs);
    selectedCat=DEFAULT_CAT;
    document.querySelector('.modal-overlay')?.remove();
    showCatMgr();renderCatSelector();
    toast('已删除分类「'+cat+'」');
  }catch(e){toast('删除失败，请重试');}
}

let reviewQueue=[],reviewIndex=-1,reviewCatFilter=null;

async function renderReviewDashboard(){
  const all=await dbGetAll(),allDue=await getDueNotes(null),mastered=all.filter(n=>n.stage>=INTERVALS.length).length;
  document.getElementById('due-badge').textContent=allDue.length||'';
  const dash=document.getElementById('review-dashboard'),active=document.getElementById('review-active'),done=document.getElementById('review-done');
  active.style.display='none';done.style.display='none';dash.style.display='block';

  if(all.length===0){dash.innerHTML=`<div class="review-empty"><div class="emoji">📭</div><p>还没有笔记</p><p style="font-size:13px">先去「导入」添加笔记吧</p></div>`;return;}

  // 检查断点续传
  const session=loadSession();const canResume=session&&session.ids&&session.ids.length>0;

  const cats=getCats(),catDue={};
  cats.forEach(c=>{catDue[c]=allDue.filter(n=>n.category===c).length;});
  const weakDue=allDue.filter(n=>(n.weakStreak||0)>=2).length;
  const wSel=reviewCatFilter===WEAK_FILTER?' selected':'';

  const aSel=reviewCatFilter===null?' selected':'',dueF=reviewCatFilter===WEAK_FILTER?allDue.filter(n=>(n.weakStreak||0)>=2):(reviewCatFilter?allDue.filter(n=>n.category===reviewCatFilter):allDue);

  let newAvail=0;
  if(reviewCatFilter){const u=getDailyNewUsed(reviewCatFilter);const lim=getCatLimit(reviewCatFilter);newAvail=Math.min(newCards.length,Math.max(0,lim-u));}
  else{const cats=[...new Set(newCards.map(n=>n.category))];cats.forEach(c=>{const u=getDailyNewUsed(c);const lim=getCatLimit(c);newAvail+=Math.min(newCards.filter(n=>n.category===c).length,Math.max(0,lim-u));});}

  if(totalReady===0){
    dash.innerHTML=`<div class="filter-row"><span class="filter-chip${aSel}" onclick="setReviewCat(null)">全部 (${allDue.length})</span>${fHtml}<span class="filter-chip${wSel}" onclick="setReviewCat('${WEAK_FILTER}')" style="background:${reviewCatFilter===WEAK_FILTER?'#FEF2F2':''};border-color:${reviewCatFilter===WEAK_FILTER?'#EF4444':''};color:${reviewCatFilter===WEAK_FILTER?'#EF4444':''}">🔥 待攻克 (${weakDue})</span></div><div class="review-empty"><div class="emoji">🎉</div><p>${reviewCatFilter?'该分类暂无可复习':'全部复习完毕！'}</p><p style="font-size:12px;color:var(--muted)">复习卡 ${revCards.length} · 新卡配额已用完 (${newCards.length} 等待明天)</p>${canResume?`<button class="btn btn-outline btn-sm" style="margin-top:12px;width:auto" onclick="startReview(${JSON.stringify(session.ids)},${session.idx})">⏯ 继续上次复习 (${session.ids.length} 条)</button>`:''}</div>`;
    return;
  }
  dash.innerHTML=`<div class="filter-row"><span class="filter-chip${aSel}" onclick="setReviewCat(null)">全部 (${allDue.length})</span>${fHtml}<span class="filter-chip${wSel}" onclick="setReviewCat('${WEAK_FILTER}')" style="background:${reviewCatFilter===WEAK_FILTER?'#FEF2F2':''};border-color:${reviewCatFilter===WEAK_FILTER?'#EF4444':''};color:${reviewCatFilter===WEAK_FILTER?'#EF4444':''}">🔥 待攻克 (${weakDue})</span></div><div class="card" style="text-align:center"><div style="font-size:48px;margin-bottom:8px">🧠</div><div style="font-size:36px;font-weight:800;color:var(--pri)">${totalReady}</div><div style="font-size:13px;color:var(--sub);margin-bottom:6px">${reviewCatFilter==WEAK_FILTER?'🔥 待攻克':(reviewCatFilter?'「'+reviewCatFilter+'」':'')}复习 ${revCards.length} + 新学 ${newAvail}/${reviewCatFilter&&reviewCatFilter!==WEAK_FILTER?getCatLimit(reviewCatFilter):'—'}</div><button class="btn btn-primary" onclick="startReview()">▶ 开始复习</button>${canResume?`<button class="btn btn-outline btn-sm" style="margin-top:8px;width:auto" onclick="startReview(${JSON.stringify(session.ids)},${session.idx})">⏯ 继续上次复习 (${session.ids.length} 条)</button>`:''}</div>`;

function setReviewCat(c){reviewCatFilter=c;document.getElementById('review-sub').textContent=c===WEAK_FILTER?'正在攻克：🔥 待攻克':(c?`正在学习：${c}`:'艾宾浩斯间隔复习');renderReviewDashboard();}
async function getDueNotes(cat){const all=await dbGetAll();const n=now();let d=all.filter(x=>x.nextReview!==null&&x.nextReview<=n);if(cat===WEAK_FILTER)d=d.filter(x=>(x.weakStreak||0)>=2);else if(cat)d=d.filter(x=>x.category===cat);return d;}

async function startReview(restoreIds,restoreIdx){
  let allDue;
  if(restoreIds){
    // 从断点恢复
    const all=await dbGetAll();allDue=restoreIds.map(id=>all.find(n=>n.id===id)).filter(Boolean);
    reviewQueue=allDue;reviewIndex=restoreIdx||0;
  }else{
    allDue=await getDueNotes(reviewCatFilter);
    const reviewCards=[],newCards=[];
    allDue.forEach(n=>{if(n.stage===0&&(n.reviewCount||0)===0)newCards.push(n);else reviewCards.push(n);});
    const selectedNew=[];
    if(newCards.length){
      const cats=[...new Set(newCards.map(n=>n.category))];
      cats.forEach(c=>{
        const catNew=newCards.filter(n=>n.category===c);
        const used=getDailyNewUsed(c);
        const remain=Math.max(0,getCatLimit(c)-used);
        const pick=catNew.slice(0,remain);
        selectedNew.push(...pick);
        if(pick.length)addDailyNewUsed(c,pick.length);
      });
    }
    // 薄弱优先：weakStreak>=2 的排到队首，其余乱序
    const weakCards=reviewCards.filter(n=>(n.weakStreak||0)>=2);
    const normalCards=reviewCards.filter(n=>(n.weakStreak||0)<2);
    reviewQueue=shuffle(weakCards).concat(shuffle(normalCards)).concat(shuffle(selectedNew));
    reviewIndex=0;
  }
  if(!reviewQueue.length){renderReviewDashboard();return;}
  document.getElementById('review-dashboard').style.display='none';
  document.getElementById('review-active').style.display='block';
  document.getElementById('review-done').style.display='none';
  showCard();
  saveSession(reviewQueue.map(n=>n.id),reviewIndex,reviewCatFilter);
}

  }

async function rateCard(rating){
  const note=reviewQueue[reviewIndex];
  undoSrc={id:note.id,stage:note.stage,nextReview:note.nextReview,reviewCount:note.reviewCount,lastRating:note.lastRating,reviewLog:note.reviewLog?[...note.reviewLog]:[],weakStreak:note.weakStreak||0,index:reviewIndex,reinsert:false};
  note.reviewCount=(note.reviewCount||0)+1;note.lastRating=rating;
  if(!note.reviewLog)note.reviewLog=[];
  if(note.weakStreak===undefined)note.weakStreak=0;
  let reinsert=false,css='swipe-out',insertGap=2;

  if(rating==='forgot'){
    // 忘了：阶段归零，当天马上再考（插队首），明天必复习 → 薄弱计数 +1（不归零）
    note.stage=0;note.nextReview=addDays(now(),1);
    note.weakStreak=(note.weakStreak||0)+1;
    note.reviewLog.unshift({date:todayStr(),rating:'forgot'});
    reinsert=true;css='swipe-left';insertGap=1; // 紧挨着再考一次
    toast('标记：忘了 ← 马上再来 · 📅 明天继续');
  }else if(rating==='vague'){
    // 模糊：纯「当天」逻辑。统计今天已点过的「模糊」次数（跨天不算）
    const vagueToday=(note.reviewLog||[]).filter(r=>r.rating==='vague'&&r.date===todayStr()).length;
    note.reviewLog.unshift({date:todayStr(),rating:'vague'});
    note.nextReview=addDays(now(),1);        // 明天必复习（≠ 记住了，不进艾宾浩斯）
    note.weakStreak=(note.weakStreak||0)+1;  // 薄弱累加，不归零
    if(vagueToday>=1){
      // 今天第 2 次模糊 → 今天到此，明天仍复习（不清零、不当成记住了）
      toast('标记：模糊×2 ← 今天到此 · 📅 明天继续');
    }else{
      // 今天第 1 次模糊 → 当天再来一次（插中间）
      reinsert=true;insertGap=Math.max(2,Math.floor((reviewQueue.length-reviewIndex)/2));
      toast('标记：模糊 ← 再来一次 · 📅 明天继续');
    }
  }else{
    // 记住了：进入艾宾浩斯下一阶段。薄弱计数「退 2 级不归零」（SM-2 / 扇贝思路）
    note.weakStreak=Math.max(0,(note.weakStreak||0)-2);
    const ns=getNextStage(note.stage);
    note.stage=ns!==null?ns:INTERVALS.length;
    let days=ns!==null?INTERVALS[Math.min(ns,INTERVALS.length-1)]:null;
    if(days!==null&&note.weakStreak>=2){days=Math.max(1,Math.round(days*WEAK_DISCOUNT));} // 薄弱项间隔打折
    note.nextReview=days!==null?addDays(now(),days):null;
    note.reviewLog.unshift({date:todayStr(),rating:'remembered'});
    toast('标记：记住了'+(days!==null?(' 📅 约'+days+'天后'+(note.weakStreak>=2?' ⚡间隔打折':'')):' ✅ 已掌握'));
  }
  await dbPut(note);

  const card=document.getElementById('review-card');
  card.classList.add(css);
  await new Promise(r=>setTimeout(r,280));

  if(reinsert){
    undoSrc.reinsert=true;
    // 忘了插到队首附近（马上再考），模糊插到队列中间
    const pos=reviewIndex+insertGap;
    reviewQueue.splice(pos,0,note);
  }
  reviewIndex++;
  if(reviewIndex>=reviewQueue.length){finishReview();return;}
  showCard();
  saveSession(reviewQueue.map(n=>n.id),reviewIndex,reviewCatFilter);
}
async function undoLastRating(){
  if(!undoSrc)return;
  const note=await dbGet(undoSrc.id);if(!note)return;
  note.stage=undoSrc.stage;note.nextReview=undoSrc.nextReview;note.reviewCount=undoSrc.reviewCount;note.lastRating=undoSrc.lastRating;note.reviewLog=undoSrc.reviewLog;note.weakStreak=undoSrc.weakStreak;
  await dbPut(note);
  // 如果上次是重插（忘了/模糊），从队尾移除重插的副本
  if(undoSrc.reinsert){for(let i=reviewQueue.length-1;i>reviewIndex;i--){if(reviewQueue[i].id===note.id){reviewQueue.splice(i,1);break;}}}
  reviewQueue.splice(reviewIndex,0,note);reviewIndex=undoSrc.index;
  undoSrc=null;toast('已撤销');
  showCard();
}
async function delReviewNote(){
  const note=reviewQueue[reviewIndex];
  const pre=note.front||(note.content||'').slice(0,20);
  if(!confirm(`删除「${pre}」？`))return;
  await dbDelete(note.id);
  reviewQueue.splice(reviewIndex,1);
  toast('已删除');
  if(reviewIndex>=reviewQueue.length){finishReview();return;}
  showCard();
}
function finishReview(){document.getElementById('review-active').style.display='none';const d=document.getElementById('review-dashboard');d.style.display='block';d.innerHTML=`<div class="review-summary"><div class="emoji">✅</div><div class="title">本轮复习完成</div><div class="detail">共复习 ${reviewQueue.length} 条</div></div>`;reviewQueue=[];reviewIndex=-1;clearSession();setTimeout(renderReviewDashboard,100);}

document.getElementById('import-btn').addEventListener('click',doImport);
document.getElementById('import-ta').addEventListener('input',previewImport);
function previewImport(){const r=document.getElementById('import-ta').value.trim();const i=parseNotes(r);const p=document.getElementById('import-preview');if(!i.length){p.innerHTML='';return;}p.innerHTML=i.slice(0,20).map((c,j)=>`<div class="preview-item"><span class="idx">#${j+1}</span>${c.front?eHtml(c.front)+' <span style="color:var(--pri)">|</span> '+eHtml(c.back):eHtml(c.content)}</div>`).join('')+(i.length>20?`<div style="font-size:12px;color:var(--muted);text-align:center;padding:6px">... 还有 ${i.length-20} 条</div>`:'');}
function parseNotes(r){return r.split(/\n*---\n*/).map(s=>s.trim()).filter(s=>s.length>0).map(s=>{const idx=s.indexOf('|');if(idx>0&&idx<s.length-1){return{front:s.slice(0,idx).trim(),back:s.slice(idx+1).trim(),content:s};}return{content:s};});}

async function doImport(){
  const r=document.getElementById('import-ta').value.trim();if(!r){toast('请先粘贴');return;}
  const items=parseNotes(r);if(!items.length){toast('未识别到笔记');return;}
  const exist=await dbGetAll();let added=0,merged=0,skip=0;
  for(const item of items){
    // 匹配合并：按 front 或 content 前30字
    const match=item.front?
      exist.find(n=>n.front===item.front&&n.category===selectedCat):
      exist.find(n=>(n.content||'').slice(0,30)===(item.content||'').slice(0,30)&&!n.front&&n.category===selectedCat);
    if(match){
      if(match.front){
        const mergedB=mergeBack(match.back,item.back||'');
        if(mergedB===match.back){skip++;continue;}
        match.back=mergedB;match.content=match.front+' | '+mergedB;
      }else{
        if(match.content===item.content){skip++;continue;}
        match.content=mergeBack(match.content,item.content||'');
      }
      await dbPut(match);merged++;
    }else{
      await dbPut({...(item.front?{front:item.front,back:item.back}:{}),content:item.content||'',category:selectedCat,stage:0,nextReview:now(),createdAt:now(),reviewCount:0,lastRating:null,reviewLog:[]});
      added++;
    }
  }
  document.getElementById('import-ta').value='';document.getElementById('import-preview').innerHTML='';
  const msgs=[];if(added)msgs.push(`新增 ${added} 条`);if(merged)msgs.push(`合并 ${merged} 条`);if(skip)msgs.push(`跳过 ${skip} 条`);
  toast(`✅ ${msgs.join('，')}`);
  renderNoteList();renderReviewDashboard();updateBadge();
}

// ── 智能合并 back ──
function mergeBack(oldB,newB){
  if(!oldB||!newB)return newB||oldB||'';
  if(newB.includes(oldB))return newB;       // 新的是超集
  if(oldB.includes(newB))return oldB;       // 无新增
  const ov=longestCommon(oldB,newB);
  if(ov.length<2)return oldB+'；'+newB;     // 无重叠
  const rest=newB.replace(ov,'').replace(/^[,;，；\s]+|[,;，；\s]+$/g,'').trim();
  if(!rest)return oldB;
  return oldB+'；'+rest;
}
function longestCommon(a,b){let best='';for(let i=0;i<a.length;i++)for(let j=i+1;j<=a.length;j++){const s=a.slice(i,j);if(b.includes(s)&&s.length>best.length)best=s;}return best;}
function noteKey(n){return(n.category||'')+'::'+(n.front||'')+'::'+(n.content||'').slice(0,30);}
let noteFilterCat=null;let noteFilterMastered=false;let noteFilterWeak=false;
async function renderNoteList(){
  const all=await dbGetAll(),cats=getCats(),cc={};cats.forEach(c=>{cc[c]=all.filter(n=>n.category===c).length;});
  const masteredCount=all.filter(n=>n.stage>=INTERVALS.length).length;
  const weakCount=all.filter(n=>(n.weakStreak||0)>=2).length;
  const aSel=noteFilterCat===null&&!noteFilterMastered&&!noteFilterWeak?' selected':'',fHtml=cats.map(c=>{const s=noteFilterCat===c&&!noteFilterMastered&&!noteFilterWeak?' selected':'';return`<span class="filter-chip${s}" onclick="setNoteF('${eAttr(c)}',false,false)">${eHtml(c)} (${cc[c]||0})</span>`;}).join('');
  const mSel=noteFilterMastered?' selected':'',wSel=noteFilterWeak?' selected':'';
  document.getElementById('note-filter').innerHTML=`<span class="filter-chip${aSel}" onclick="setNoteF(null,false,false)">全部 (${all.length})</span>${fHtml}<span class="filter-chip${mSel}" onclick="setNoteF(null,true,false)" style="background:${noteFilterMastered?'#ECFDF5':''};border-color:${noteFilterMastered?'#10B981':''};color:${noteFilterMastered?'#10B981':''}">✅ 已掌握 (${masteredCount})</span><span class="filter-chip${wSel}" onclick="setNoteF(null,false,true)" style="background:${noteFilterWeak?'#FEF2F2':''};border-color:${noteFilterWeak?'#EF4444':''};color:${noteFilterWeak?'#EF4444':''}">🔥 待攻克 (${weakCount})</span>`;
  let filtered=all;
  if(noteFilterWeak){filtered=all.filter(n=>(n.weakStreak||0)>=2);}
  else if(noteFilterMastered){filtered=all.filter(n=>n.stage>=INTERVALS.length);}
  else if(noteFilterCat){filtered=all.filter(n=>n.category===noteFilterCat);}
  // 搜索过滤
  const q=(document.getElementById('search-input')?.value||'').trim().toLowerCase();
  if(q)filtered=filtered.filter(n=>(n.content||'').toLowerCase().includes(q)||(n.front||'').toLowerCase().includes(q)||(n.back||'').toLowerCase().includes(q));
  const list=document.getElementById('note-list');
  if(!filtered.length){list.innerHTML='<p style="color:var(--muted);font-size:14px;text-align:center;padding:20px">暂无笔记</p>';return;}
  list.innerHTML=filtered.sort((a,b)=>b.createdAt-a.createdAt).slice(0,100).map(n=>`<div class="note-list-item"><span class="n-cat">${eHtml(n.category||DEFAULT_CAT)}</span><span class="n-content">${eHtml(n.front?n.front+(' · '+n.back).slice(0,20):(n.content||'').slice(0,40))}</span><span class="n-meta">${stageLabel(n.stage)}</span><span class="n-acts"><button title="编辑" onclick="editNote(${n.id})">✏️</button><button title="删除" onclick="delNote(${n.id})">🗑</button></span></div>`).join('');
}
function setNoteF(c,m,w){noteFilterCat=c;noteFilterMastered=m;noteFilterWeak=!!w;renderNoteList();}

async function editNote(id){
  const note=await dbGet(id);if(!note)return;
  const cats=getCats();
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal-box"><h3>✏️ 编辑笔记</h3><label>正面（复习时先显示）</label><textarea class="modal-textarea" id="efront">${eHtml(note.front||'')}</textarea><label>反面（点「显示答案」后显示）</label><textarea class="modal-textarea" id="eback">${eHtml(note.back||'')}</textarea><label>分类</label><select class="modal-input" id="ecat">${cats.map(c=>`<option value="${eAttr(c)}"${c===note.category?' selected':''}>${eHtml(c)}</option>`).join('')}</select><div class="modal-actions"><button class="btn btn-outline btn-sm" id="ecancel">取消</button><button class="btn btn-primary btn-sm" id="esave">保存</button></div></div>`;
  document.body.appendChild(o);
  o.querySelector('#ecancel').onclick=()=>o.remove();
  o.querySelector('#esave').onclick=async()=>{
    const front=o.querySelector('#efront').value.trim(),back=o.querySelector('#eback').value.trim(),cat=o.querySelector('#ecat').value;
    note.front=front||null;note.back=back||null;
    if(front||back)note.content=front+(back?' | '+back:'');
    else note.content=front||back||note.content;
    note.category=cat;
    await dbPut(note);o.remove();renderNoteList();renderReviewDashboard();toast('已保存');
  };
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
}
async function delNote(id){
  const note=await dbGet(id);
  const preview=note.front?`「${note.front.slice(0,20)}」`:`「${(note.content||'').slice(0,20)}」`;
  if(!confirm(`确定删除 ${preview}？`))return;
  await dbDelete(id);renderNoteList();renderReviewDashboard();updateBadge();toast('已删除');
}

// ── 导出 ──
document.getElementById('export-btn').addEventListener('click',async()=>{
  const all=await dbGetAll(),cats=getCats();
  const data={version:3,exportedAt:new Date().toISOString(),categories:cats,notes:all};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ebbinghaus-backup-'+todayStr()+'.json';a.click();
  toast('✅ 已导出 '+all.length+' 条笔记');
});

// ── 导入 JSON ──
document.getElementById('import-json-btn').addEventListener('click',()=>document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change',async e=>{
  const f=e.target.files[0];if(!f)return;
  const text=await f.text();let data;try{data=JSON.parse(text);}catch(err){toast('JSON 格式错误');return;}
  if(!data.notes||!Array.isArray(data.notes)){toast('无效的备份文件');return;}
  const exist=await dbGetAll();
  let added=0,merged=0,skipped=0;
  for(const n of data.notes){
    // 匹配：按 front+category 或 content+category
    const match=n.front?
      exist.find(x=>x.front===n.front&&x.category===(n.category||DEFAULT_CAT)):
      exist.find(x=>(x.content||'').slice(0,30)===(n.content||'').slice(0,30)&&!x.front&&x.category===(n.category||DEFAULT_CAT));
    if(match){
      if(n.front){
        const mergedB=mergeBack(match.back,n.back||'');
        if(mergedB===match.back){skipped++;continue;}
        match.back=mergedB;match.content=match.front+' | '+mergedB;
      }else{
        if((match.content||'')===(n.content||'')){skipped++;continue;}
        match.content=mergeBack(match.content,n.content||'');
      }
      // 不覆盖学习进度
      await dbPut(match);merged++;
    }else{
      delete n.id;if(!n.reviewLog)n.reviewLog=[];
      await dbPut(n);added++;
    }
  }
  // 合并分类
  if(data.categories){const cs=getCats();data.categories.forEach(c=>{if(!cs.includes(c))cs.push(c);});saveCats(cs);}
  const msgs=[];if(added)msgs.push(`新增 ${added} 条`);if(merged)msgs.push(`合并 ${merged} 条`);if(skipped)msgs.push(`跳过 ${skipped} 条`);
  toast(`✅ ${msgs.join('，')}`);
  document.getElementById('import-file').value='';
  renderCatSelector();renderNoteList();renderReviewDashboard();updateBadge();
});

// ── 清空 ──
document.getElementById('clear-btn').addEventListener('click',async()=>{
  const all=await dbGetAll();if(!all.length){toast('无笔记');return;}
  const cats=getCats(),counts={};
  cats.forEach(c=>{counts[c]=all.filter(n=>n.category===c).length;});
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal-box"><h3>🗑 按分类清空</h3><p>选择要清空的分类，该分类下所有笔记将被删除。</p>${cats.map(c=>`<div style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="clearByCat('${eAttr(c)}',${counts[c]})"><span style="font-weight:500">📂 ${eHtml(c)}</span><span style="float:right;color:var(--sub)">${counts[c]} 条</span></div>`).join('')}<div class="modal-actions" style="margin-top:12px"><button class="btn btn-sm btn-outline" onclick="this.closest('.modal-overlay').remove()">取消</button></div></div>`;
  document.body.appendChild(o);
  o.addEventListener('click',e=>{if(e.target===o)o.remove();});
});
async function clearByCat(cat,count){
  if(count===0){toast('该分类无笔记');document.querySelector('.modal-overlay')?.remove();return;}
  if(!confirm(`确定删除「${cat}」下全部 ${count} 条笔记？`))return;
  const all=await dbGetAll();
  const tasks=all.filter(n=>n.category===cat).map(n=>dbDelete(n.id));
  await Promise.all(tasks);
  document.querySelector('.modal-overlay')?.remove();
  toast('已清空「'+cat+'」');noteFilterCat=null;renderNoteList();renderReviewDashboard();updateBadge();
}

// ── 统计 ──
async function renderStats(){
  const all=await dbGetAll(),mastered=all.filter(n=>n.stage>=INTERVALS.length).length,allDue=await getDueNotes(null);
  const totalReviews=all.reduce((s,n)=>s+(n.reviewCount||0),0);
  const todayCount=all.reduce((s,n)=>s+(n.reviewLog||[]).filter(l=>l.date===todayStr()).length,0);

  const sc={};for(let i=0;i<=INTERVALS.length;i++)sc[i]=0;
  all.forEach(n=>{sc[Math.min(n.stage,INTERVALS.length)]++;});
  const sn=['新学(1天)','第1次(2天)','第2次(4天)','第3次(7天)','第4次(15天)','第5次(30天)','第6次(60天)','已掌握'];
  const sh=sn.map((n,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:13px;color:var(--sub)">${n}</span><span style="display:flex;align-items:center;gap:6px"><span style="font-size:14px;font-weight:600;color:#334155">${sc[i]||0} 条</span><span style="display:inline-block;width:${Math.max((sc[i]||0)/Math.max(all.length,1)*120,2)}px;height:6px;background:${i>=INTERVALS.length?'var(--ok)':'var(--pri)'};border-radius:3px;opacity:${0.3+(i/INTERVALS.length)*0.7}"></span></span></div>`).join('');

  const cats=getCats(),csHtml=cats.map(c=>{const cnt=all.filter(n=>n.category===c).length,dc=allDue.filter(n=>n.category===c).length,mc=all.filter(n=>n.category===c&&n.stage>=INTERVALS.length).length;return cnt>0?`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F1F5F9"><span style="font-size:14px;font-weight:500">📂 ${eHtml(c)}</span><div style="display:flex;gap:12px;font-size:13px;color:var(--sub)"><span>总 ${cnt}</span><span style="color:var(--warn)">待 ${dc}</span><span style="color:var(--ok)">✓ ${mc}</span></div></div>`:'';}).filter(Boolean).join('');

  document.getElementById('stats-content').innerHTML=`
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val">${all.length}</div><div class="stat-label">总笔记</div></div>
      <div class="stat-box success"><div class="stat-val">${mastered}</div><div class="stat-label">已掌握</div></div>
      <div class="stat-box warn"><div class="stat-val">${allDue.length}</div><div class="stat-label">待复习</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-box accent"><div class="stat-val">${todayCount}</div><div class="stat-label">今日复习</div></div>
      <div class="stat-box"><div class="stat-val">${totalReviews}</div><div class="stat-label">累计复习</div></div>
    </div>
    ${csHtml?`<div class="card"><div class="card-title">📂 分类概览</div>${csHtml}</div>`:''}
    <div class="card"><div class="card-title">📈 学习进度</div>${sh}</div>`;
}

async function updateBadge(){const d=await getDueNotes(null);document.getElementById('due-badge').textContent=d.length||'';}

// ── Bootstrap ──
(async function init(){
  await openDB();
  // 迁移：补 category + reviewLog
  const all=await dbGetAll();
  for(const n of all){
    let m=false;
    if(!n.category){n.category=DEFAULT_CAT;m=true;}
    if(!n.reviewLog){n.reviewLog=[];m=true;}
    if(m)await dbPut(n);
  }
  renderCatSelector();await renderReviewDashboard();await updateBadge();
  initAutoUpdate();
})();

// ═══════════ 版本自检 + 强制刷新 ═══════════
const APP_VERSION=10;
const MAX_FORCE_RELOAD=2; // 同会话最多强制刷新次数：超出即放弃，杜绝「检测→刷新→仍旧版」死循环
async function initAutoUpdate(){
  const tried=parseInt(sessionStorage.getItem('__ebUpdateTries')||'0',10);
  if(tried>=MAX_FORCE_RELOAD)return; // 兜底：即使 SW 仍服务旧版，也最多刷 2 次，保证可用
  // 注册 SW（导航请求永远拉最新 index.html，见 sw.js）
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js?v=11').catch(()=>{});
  }
  // 拉取线上版本号（强制绕过缓存）
  try{
    const res=await fetch('version.json?t='+Date.now(),{cache:'no-store'});
    const data=await res.json();
    if(data.version && data.version!==APP_VERSION){
      sessionStorage.setItem('__ebUpdateTries',String(tried+1));
      try{const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}catch(e){}
      try{const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}catch(e){}
      // 用缓存破击 URL 导航，确保真正拉到新版 index.html（绕过 HTTP/SW 缓存）
      const sep=location.href.includes('?')?'&':'?';
      location.replace(location.pathname+sep+'__v='+Date.now());
    }
  }catch(e){/* 离线或拉取失败，忽略，下次再说 */}
}
